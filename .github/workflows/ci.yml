name: Build i testy (CI)

# DietetykTests/ pokrywa testami jednostkowymi czystą logikę bez zależności
# od żywego HealthKit/sieci (kontrakt JSON webhooka, formatowanie dat,
# walidacja adresu backendu) - patrz project.yml (target DietetykTests).
# `xcodebuild test` jednocześnie kompiluje całą apkę (więc nadal łapie błędy
# składniowe/typów jak poprzedni "kanarek kompilacji") I uruchamia te testy
# na prawdziwym, bootowalnym symulatorze - w przeciwieństwie do builda na
# `generic/platform=iOS Simulator` (który nie wybiera konkretnego urządzenia,
# więc nie wystarcza do odpalenia testów).
# Buduje bez podpisywania, bo runner CI nie ma zespołu deweloperskiego
# (DEVELOPMENT_TEAM w project.yml jest celowo puste).
#
# Uruchamia się na push (każdy branch) i pull requestach do main, plus
# ręcznie (workflow_dispatch), gdyby trzeba było sprawdzić build/testy bez pushowania.

on:
  push:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  test:
    name: xcodebuild test (Debug, Simulator)
    runs-on: macos-15
    steps:
      - name: Checkout kodu
        uses: actions/checkout@v5

      # Xcode 16.4 - domyślna wersja na obrazie macos-15, z preinstalowanym
      # i gotowym do bootowania symulatorem iOS 18.5 ("iPhone 16"). Starsze
      # 16.x (np. 16.2) są też zainstalowane, ale ich symulatory NIE są
      # pre-bootowane na tym obrazie - `xcodebuild test` (w odróżnieniu od
      # samego build) wymaga realnie dostępnego symulatora, więc pinujemy
      # wersję zgodną z tym, co runner faktycznie ma przygotowane.
      - name: Wybór wersji Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.4'

      # Projekt nie trzyma commitowanego .xcodeproj (zob. .gitignore) -
      # generujemy go z project.yml, tak samo jak deweloper robi to lokalnie.
      - name: Instalacja XcodeGen
        run: brew install xcodegen

      - name: Generowanie projektu Xcode (xcodegen)
        run: xcodegen generate

      - name: Build + testy jednostkowe (symulator, bez podpisywania)
        run: |
          xcodebuild test \
            -project Dietetyk.xcodeproj \
            -scheme Dietetyk \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO
