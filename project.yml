name: Dietetyk
options:
  bundleIdPrefix: com.renacode
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    TARGETED_DEVICE_FAMILY: "1,2"
    ENABLE_PREVIEWS: YES

targets:
  Dietetyk:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Dietetyk
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.renacode.dietetyk
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Dietetyk AI"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "Aplikacja potrzebuje dostępu do aparatu, aby zrobić zdjęcie posiłku do analizy AI."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Aplikacja potrzebuje dostępu do zdjęć, aby wybrać zdjęcie posiłku do analizy AI."
        INFOPLIST_KEY_NSHealthShareUsageDescription: "Aplikacja odczytuje dane z Zdrowia (kroki, kalorie, dystans, treningi, temperatura nadgarstka), aby zsynchronizować je z Twoim kontem Dietetyk AI - zastępuje to ręczną konfigurację webhooka Health Auto Export."
        # GENERATE_INFOPLIST_FILE: YES synteyzuje Info.plist z ustawień
        # INFOPLIST_KEY_* - klucz typu "lista" (np. orientacje) ustawia się
        # jako string z wartościami rozdzielonymi spacją, NIE przez osobny
        # blok "info:" (ten wymaga "path:" do realnego pliku .plist i bez
        # niego xcodegen 2.45.4 wywala "Decoding failed at \"path\"").
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
    capabilities: []
    entitlements:
      path: Dietetyk/Dietetyk.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.healthkit.background-delivery: true

  # Testy jednostkowe logiki, która nie wymaga realnego sprzętu/danych
  # HealthKit ani sieci (kontrakt JSON webhooka, formatowanie dat,
  # walidacja adresu serwera) - patrz DietetykTests/. CI (xcodebuild test)
  # uruchamia je na symulatorze przy każdym push/PR.
  DietetykTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: DietetykTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_TESTABILITY: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Dietetyk.app/Dietetyk"
        BUNDLE_LOADER: "$(TEST_HOST)"
    dependencies:
      - target: Dietetyk

schemes:
  Dietetyk:
    build:
      targets:
        Dietetyk: all
        DietetykTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - DietetykTests
    archive:
      config: Release
